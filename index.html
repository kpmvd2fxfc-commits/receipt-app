<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Receipt Tracker AI</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;margin:0;background:#f3f4f6;color:#111827}
    .wrap{max-width:780px;margin:0 auto;padding:16px}
    .card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    h1,h2{margin:0 0 12px}
    button,input{font:inherit}
    .btn{background:#111827;color:#fff;border:none;padding:12px 16px;border-radius:12px}
    .muted{color:#6b7280}
    table{width:100%;border-collapse:collapse}
    td,th{padding:10px 6px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top}
    .small{font-size:13px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Receipt Tracker AI</h1>
    <p class="muted">iPhone-friendly app for UAE grocery receipts. Snap a receipt, extract items with AI, and track daily spending.</p>
    <input id="file" type="file" accept="image/*,application/pdf" capture="environment" />
    <button class="btn" onclick="uploadReceipt()">Scan receipt</button>
    <p id="status" class="small muted"></p>
  </div>

  <div class="card">
    <h2>Daily spending</h2>
    <div id="daily"></div>
  </div>

  <div class="card">
    <h2>Average prices</h2>
    <div id="prices"></div>
  </div>

  <div class="card">
    <h2>All receipts</h2>
    <div id="receipts"></div>
  </div>
</div>
<script>
async function uploadReceipt(){
  const file = document.getElementById('file').files[0];
  if(!file){ alert('Choose or take a photo first.'); return; }
  const fd = new FormData();
  fd.append('file', file);
  status.textContent = 'Reading receipt with AI...';
  const res = await fetch('/api/upload', {method:'POST', body:fd});
  const data = await res.json();
  if(!res.ok){ status.textContent = data.detail || 'Upload failed'; return; }
  status.textContent = 'Saved.';
  await loadAll();
}
function table(rows, headers){
  let html = '<table><thead><tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>';
  for(const r of rows){ html += '<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>'; }
  html += '</tbody></table>'; return html;
}
async function loadDaily(){
  const rows = await (await fetch('/api/daily-spend')).json();
  daily.innerHTML = rows.length ? table(rows.map(r=>[r.date, `${r.total.toFixed(2)} AED`]), ['Date','Total']) : '<p class="muted">No receipts yet.</p>';
}
async function loadPrices(){
  const rows = await (await fetch('/api/average-prices')).json();
  prices.innerHTML = rows.length ? table(rows.map(r=>[r.item, `${r.avg_unit_price.toFixed(2)} AED`, r.times_bought]), ['Item','Average unit price','Bought']) : '<p class="muted">No data yet.</p>';
}
async function loadReceipts(){
  const rows = await (await fetch('/api/receipts')).json();
  if(!rows.length){ receipts.innerHTML = '<p class="muted">No receipts yet.</p>'; return; }
  receipts.innerHTML = rows.map(r => `
    <div style="padding:12px 0;border-bottom:1px solid #e5e7eb">
      <strong>${r.store_name}</strong><br>
      <span class="small muted">${r.receipt_date} · ${Number(r.total_amount).toFixed(2)} ${r.currency}</span>
      <div class="small" style="margin-top:8px">
        ${r.items.slice(0,8).map(i => `${i.normalized_name} — ${Number(i.line_total).toFixed(2)} ${r.currency}`).join('<br>')}
        ${r.items.length > 8 ? '<br><span class="muted">…more items</span>' : ''}
      </div>
    </div>`).join('');
}
async function loadAll(){ await loadDaily(); await loadPrices(); await loadReceipts(); }
loadAll();
</script>
</body>
</html>
