services:
  - type: web
    name: receipt-tracker-ai
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: DATABASE_URL
        fromDatabase:
          name: receipt-tracker-db
          property: connectionString

databases:
  - name: receipt-tracker-db
    plan: basic-256mb
